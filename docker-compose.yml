services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/actuator/health 2>/dev/null || wget --quiet --tries=1 --spider http://localhost:8080/accounts/1 2>/dev/null; exit 0"]
      interval: 10s
      timeout: 5s
      retries: 5
